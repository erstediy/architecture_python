version: '3.8'

services:
  auth-service:
    build:
      context: .
      args:
        SERVICE: auth_service
        PORT: 8000
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=changeme-32-char-secret-key-here!
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - services-network

  property-service:
    build:
      context: .
      args:
        SERVICE: property_service
        PORT: 8001
    ports:
      - "8001:8001"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8000
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - services-network

networks:
  services-network:
    driver: bridge
