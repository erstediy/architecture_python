version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: real_estate
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/data.sql:/docker-entrypoint-initdb.d/02_data.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - services-network

  auth-service:
    build:
      context: .
      args:
        SERVICE: auth_service
        PORT: 8000
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=changeme-32-char-secret-key-here!
      - DB_DSN=postgresql://postgres:postgres@postgres:5432/real_estate
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - services-network

  property-service:
    build:
      context: .
      args:
        SERVICE: property_service
        PORT: 8001
    ports:
      - "8001:8001"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8000
      - DB_DSN=postgresql://postgres:postgres@postgres:5432/real_estate
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - services-network

networks:
  services-network:
    driver: bridge

volumes:
  postgres_data:
